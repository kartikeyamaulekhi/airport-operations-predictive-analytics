# -- Server --------------------------------------------------------------------
server.port=8080

# -- Application ---------------------------------------------------------------
spring.application.name=airport-backend

# -- H2 In-Memory Database -----------------------------------------------------
spring.datasource.url=jdbc:h2:mem:airportdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# -- ML Service connection ------------------------------------------------------
ml.service.url=${ML_SERVICE_URL:http://localhost:8000}
ml.service.timeout.seconds=30
ml.service.forecast.days=30

# -- Actuator ------------------------------------------------------------------
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.app.name=Airport Operations Backend
management.info.app.version=1.0.0

# -- Logging -------------------------------------------------------------------
logging.level.com.kartikeya.airportbackend=INFO
logging.level.org.springframework.web=WARN
logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level [ID: %X{requestId}] %logger{36} - %msg%n
