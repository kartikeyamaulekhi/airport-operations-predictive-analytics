# ── Server ────────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── Application ───────────────────────────────────────────────────────────────
spring.application.name=airport-backend

# ── Database (H2 for local dev, PostgreSQL for production) ───────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:airportdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}

# H2 console (local dev only)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

# ── ML Service ────────────────────────────────────────────────────────────────
ml.service.url=${ML_SERVICE_URL:http://localhost:8000}
ml.service.timeout.seconds=35
ml.service.forecast.days=30

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.kartikeya.airportbackend=INFO
logging.level.org.springframework.web=WARN
logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n


# Email Alerts
alert.email.to=${ALERT_EMAIL_TO:}
alert.email.from=${ALERT_EMAIL_FROM:}
alert.email.enabled=${ALERT_EMAIL_ENABLED:false}
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${ALERT_EMAIL_FROM:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.task.scheduling.pool.size=2
